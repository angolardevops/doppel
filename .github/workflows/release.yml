name: release

# Gera binários Linux (glibc) para x86_64 e aarch64 — build NATIVO em cada
# arquitetura (runners x64 e ARM64 do GitHub) — e anexa-os ao Release sempre
# que uma tag `v*` é criada. Também pode ser disparado manualmente.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset: doppel-linux-x64
          - runner: ubuntu-24.04-arm
            asset: doppel-linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Instalar libpam (dev)
        run: sudo apt-get update && sudo apt-get install --assume-yes libpam0g-dev

      - name: Build
        run: cargo build --release

      - name: Preparar artefacto
        run: |
          cp target/release/doppel "${{ matrix.asset }}"
          strip "${{ matrix.asset }}" || true
          sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"

      - name: Anexar ao Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

      # Em disparo manual (sem tag) guarda como artefacto do workflow.
      - name: Guardar artefacto (manual)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
